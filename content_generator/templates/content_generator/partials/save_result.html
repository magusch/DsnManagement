{% load admin_urls %}
{% if error %}
<div style="padding: 16px; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px;">
    <p style="margin: 0; color: #721c24; font-weight: bold;">{{ error }}</p>
</div>
{% else %}
<div style="padding: 16px; background: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px;">
    <p style="margin: 0 0 8px 0; color: #155724; font-weight: bold;">
        Пост сохранён!
    </p>
    <p style="margin: 0; font-size: 13px;">
        «{{ post.title }}» — статус: черновик.
        <a href="{{ admin_url }}" style="color: #417690;">Открыть в админке</a>
    </p>
</div>
{% endif %}
